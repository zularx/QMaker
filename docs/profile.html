<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Главная</title>
    <link rel="stylesheet" href="static/styles/output.css">
    <link rel="stylesheet" href="static/styles/labitems.css">
    <script src="https://telegram.org/js/telegram-web-app.js?62"></script>
    <script src="static/scripts/burger.js" defer></script>
    <script src="static/scripts/profile.js" defer></script>
</head>

<body class="bg-base-dark-darkTheme min-w-32">
    <header class="bg-base-light-darkTheme w-full h-7 mt-1.5 rounded-2 flex justify-between items-center">
        <p class="text-base-dark-darkTheme text-3 font-extrabold absolute left-1/2 -translate-x-1/2">QMaker</p>
        <button id="burgerMenuButton" class="mr-1.5 ml-auto group hover:cursor-pointer">
            <div
                class="bg-white w-3 h-[3px] rounded-1 mb-[6px] group-hover:bg-primary-darkTheme group-active:bg-secondary-darkTheme">
            </div>
            <div
                class="bg-white w-3 h-[3px] rounded-1 mb-[6px] group-hover:bg-primary-darkTheme group-active:bg-secondary-darkTheme">
            </div>
            <div
                class="bg-white w-3 h-[3px] rounded-1 group-hover:bg-primary-darkTheme group-active:bg-secondary-darkTheme">
            </div>
        </button>
        <nav id="headerNavBar"
            class="bg-base-medium-darkTheme h-full w-25 fixed right-0 rounded-l-2 top-0 translate-x-full transition-transform duration-300 ease-out z-2">
            <button class="w-3 h-3 group cursor-pointer flex relative mt-3 right-0 ml-auto mr-1.5 items-center" id="closeNavBar">
                <div
                    class="bg-white w-3 h-[3px] absolute rotate-45 rounded-1 group-hover:bg-primary-darkTheme group-active:bg-secondary-darkTheme">
                </div>
                <div
                    class="bg-white w-3 h-[3px] absolute -rotate-45 rounded-1 group-hover:bg-primary-darkTheme group-active:bg-secondary-darkTheme">
                </div>
            </button>
            <div class="flex flex-col ml-5 mt-4">
                <a href="/docs/index.html" class="text-white hover:text-primary-darkTheme active:text-secondary-darkTheme w-fit text-[24px]">Главная</a>
                <a href="" id="profileLink" class="max-w-15 overflow-hidden text-ellipsis whitespace-nowrap text-white hover:text-primary-darkTheme active:text-secondary-darkTheme text-[24px]"></a>
            </div>
        </nav>
    </header>
    <main class="bg-base-light-darkTheme w-full min-h-30 max-h-fit rounded-2 mt-10 pt-3 relative py-3 flex flex-col items-center">
        <img id="profilePicture" src="" alt="avatar" class="w-10 h-10 bg-black rounded-10 absolute -top-5">
        <div id="profileStats" class="w-30 h-25 mt-3 flex flex-col items-center">
            <p id="username" class="text-white text-[25px] font-medium">NEKTARYN</p>
        </div>
    </main>
    <footer class="bg-base-light-darkTheme w-full h-9 mt-10 rounded-t-2 flex justify-center items-center">
        <p class="text-base-dark-darkTheme text-3 font-extrabold">QMaker</p>
    </footer>
</body>

</html>
